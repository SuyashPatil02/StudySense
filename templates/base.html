<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title if title else "StudySense" }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* ===== Light theme default ===== */
        :root,
        [data-theme="light"] {
            --bg: #f3f7ff;
            --bg2: #e6eefc;
            --text: #0f172a;
            --muted: #475569;
            --card: rgba(255, 255, 255, .85);
            --stroke: rgba(15, 23, 42, .15);
            --brand: #2563eb;
            --brand2: #06b6d4;
            --sidebar-w: 250px;
        }

        /* ===== Dark theme ===== */
        [data-theme="dark"] {
            --bg: #0b1220;
            --bg2: #111a2e;
            --text: #e6edf7;
            --muted: #a9b4c7;
            --card: rgba(255, 255, 255, .08);
            --stroke: rgba(255, 255, 255, .15);
            --brand: #4f8cff;
            --brand2: #22d3ee;
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            color: var(--text);
            min-height: 100vh;
            font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
            background:
                radial-gradient(1200px 600px at 10% -10%, #1d4ed8 0%, transparent 50%),
                radial-gradient(1000px 500px at 90% 0%, #0ea5e9 0%, transparent 45%),
                linear-gradient(160deg, var(--bg), var(--bg2));
        }

        .app-shell {
            display: flex;
            min-height: 100vh
        }

        .sidebar {
            width: var(--sidebar-w);
            position: fixed;
            inset: 0 auto 0 0;
            z-index: 1030;
            padding: 18px 14px;
            border-right: 1px solid var(--stroke);
            background: color-mix(in srgb, var(--bg) 80%, transparent);
            backdrop-filter: blur(10px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin-bottom: 16px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text);
            background: linear-gradient(135deg, rgba(79, 140, 255, .25), rgba(34, 211, 238, .18));
            border: 1px solid var(--stroke);
        }

        .logo {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            border-radius: 10px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--brand), var(--brand2));
        }

        .nav-title {
            font-size: 11px;
            letter-spacing: .8px;
            text-transform: uppercase;
            color: var(--muted);
            margin: 16px 10px 8px
        }

        .side-link {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 12px;
            margin: 4px 0;
            transition: .2s ease;
            border: 1px solid transparent;
        }

        .side-link:hover {
            background: rgba(255, 255, 255, .06);
            border-color: var(--stroke);
            transform: translateX(2px)
        }

        .side-link.active {
            background: linear-gradient(135deg, rgba(79, 140, 255, .28), rgba(34, 211, 238, .20));
            border-color: var(--stroke)
        }

        .main {
            margin-left: var(--sidebar-w);
            width: calc(100% - var(--sidebar-w));
            display: flex;
            flex-direction: column;
            min-height: 100vh
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 1020;
            padding: 14px 22px;
            border-bottom: 1px solid var(--stroke);
            background: color-mix(in srgb, var(--bg) 78%, transparent);
            backdrop-filter: blur(8px);
        }

        .content {
            padding: 22px;
            flex: 1
        }

        .glass-card,
        .dashboard-card,
        .card {
            background: var(--card) !important;
            border: 1px solid var(--stroke) !important;
            border-radius: 16px !important;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, .20);
            color: var(--text);
        }

        .card h6,
        .text-muted {
            color: var(--muted) !important
        }

        .form-control,
        .form-select {
            background: rgba(255, 255, 255, .08) !important;
            color: var(--text) !important;
            border: 1px solid var(--stroke) !important;
            border-radius: 12px !important;
        }

        .btn {
            border-radius: 12px !important;
            font-weight: 600;
            border: none
        }

        .btn-info {
            background: linear-gradient(135deg, #0ea5e9, #2563eb) !important;
            color: #fff !important
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #16a34a) !important;
            color: #fff !important
        }

        .progress {
            background: rgba(255, 255, 255, .10) !important;
            border-radius: 999px !important;
            overflow: hidden
        }

        .progress-bar {
            background: linear-gradient(90deg, #22c55e, #16a34a) !important;
            font-weight: 700;
            color: #fff
        }

        .footer {
            border-top: 1px solid var(--stroke);
            color: var(--muted);
            font-size: .85rem;
            padding: 12px 22px;
            background: color-mix(in srgb, var(--bg) 82%, transparent);
        }

        .mobile-toggle {
            display: none
        }

        .theme-btn {
            border: 1px solid var(--stroke) !important;
            background: rgba(255, 255, 255, .08) !important;
            color: var(--text) !important;
            border-radius: 10px !important;
            padding: 6px 12px !important;
        }

        @media (max-width:992px) {
            .sidebar {
                transform: translateX(-100%);
                transition: .25s ease;
                width: 260px
            }

            .sidebar.show {
                transform: translateX(0)
            }

            .main {
                margin-left: 0;
                width: 100%
            }

            .mobile-toggle {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 38px;
                height: 38px;
                border-radius: 10px;
                border: 1px solid var(--stroke);
                background: rgba(255, 255, 255, .08);
                color: var(--text);
            }
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <a class="brand" href="{{ url_for('home') }}">
                <div class="logo">S</div>
                <div>
                    <div style="font-weight:700;line-height:1.1">StudySense</div>
                    <small style="opacity:.85">Track • Focus • Improve</small>
                </div>
            </a>

            <div class="nav-title">Navigation</div>

            <a class="side-link {% if request.endpoint=='home' %}active{% endif %}" href="{{ url_for('home') }}">
                <i class="bi bi-house"></i> <span>Home</span>
            </a>

            <a class="side-link {% if request.endpoint=='dashboard' %}active{% endif %}"
                href="{{ url_for('dashboard') }}">
                <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
            </a>

            <a class="side-link {% if request.endpoint=='log_session' %}active{% endif %}"
                href="{{ url_for('log_session') }}">
                <i class="bi bi-plus-circle"></i> <span>Log Session</span>
            </a>

            <a class="side-link {% if request.endpoint=='analytics' %}active{% endif %}"
                href="{{ url_for('analytics') }}">
                <i class="bi bi-bar-chart"></i> <span>Analytics</span>
            </a>

            <a class="side-link {% if request.endpoint=='recommendations' %}active{% endif %}"
                href="{{ url_for('recommendations') }}">
                <i class="bi bi-lightbulb"></i> <span>Recommendations</span>
            </a>

            <a class="side-link {% if request.endpoint=='login' %}active{% endif %}" href="{{ url_for('login') }}">
                <i class="bi bi-box-arrow-in-right"></i> <span>Login</span>
            </a>
        </aside>

        <main class="main">
            <header class="topbar d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-2">
                    <button class="mobile-toggle" id="menuBtn" type="button"><i class="bi bi-list"></i></button>
                    <div>
                        <div style="font-weight:600">{{ title if title else "StudySense" }}</div>
                        <small class="text-muted">Welcome back! Keep your streak alive 🔥</small>
                    </div>
                </div>

                <!-- Theme Toggle -->
                <button id="themeToggle" class="btn theme-btn btn-sm">
                    <i class="bi bi-moon-stars"></i> Theme
                </button>
            </header>

            <section class="content">
                {% block content %}{% endblock %}
            </section>

            <footer class="footer">
                © 2026 StudySense • Final Year Project
            </footer>
        </main>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        if (menuBtn && sidebar) {
            menuBtn.addEventListener('click', () => sidebar.classList.toggle('show'));
        }

        // Theme Toggle with localStorage
        (function () {
            const html = document.documentElement;
            const btn = document.getElementById("themeToggle");

            const savedTheme = localStorage.getItem("theme") || "dark";
            html.setAttribute("data-theme", savedTheme);

            btn?.addEventListener("click", () => {
                const current = html.getAttribute("data-theme");
                const next = current === "dark" ? "light" : "dark";
                html.setAttribute("data-theme", next);
                localStorage.setItem("theme", next);
            });
        })();
    </script>
</body>

</html>
