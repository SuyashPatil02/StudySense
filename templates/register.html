<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register • StudySense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b, #0b1220);
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .cardx {
            width: min(92vw, 430px);
            padding: 28px 24px;
            border-radius: 20px;
            background: rgba(255, 255, 255, .10);
            border: 1px solid rgba(255, 255, 255, .22);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, .35);
        }

        .form-control {
            border-radius: 12px;
            background: rgba(255, 255, 255, .12);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, .25);
            padding: 11px 13px;
        }

        .form-control::placeholder {
            color: #d1d5db;
        }

        .btn-main {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 11px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
        }

        a {
            color: #93c5fd;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="cardx">
        <h3 class="mb-1">Create Account</h3>
        <p class="text-light mb-3" style="opacity:.85;">Join StudySense 🚀</p>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-main">Register</button>
        </form>

        <div class="mt-3 text-center">
            Already have an account? <a href="{{ url_for('login') }}">Login</a>
        </div>
    </div>
</body>

</html>
