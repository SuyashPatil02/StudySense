{% extends "base.html" %}
{% block content %}
<div class="container slide-up" style="max-width: 500px;">
    <div class="card glass-card p-4">
        <h3 class="mb-3 text-center"><i class="fa-solid fa-user"></i> Login / Register</h3>
        <form method="POST">
            <div class="mb-3">
                <label>Username</label>
                <input type="text" class="form-control" name="username" required>
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" name="action" value="login" class="btn btn-primary w-100">Login</button>
                <button type="submit" name="action" value="register" class="btn btn-success w-100">Register</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
