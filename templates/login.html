<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login • StudySense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #0b1220);
            color: #fff;
        }

        /* Animated background bubbles */
        .bg-bubble {
            position: absolute;
            border-radius: 50%;
            filter: blur(2px);
            opacity: .35;
            animation: float 12s infinite ease-in-out;
        }

        .b1 {
            width: 220px;
            height: 220px;
            background: #3b82f6;
            left: 8%;
            top: 12%;
            animation-delay: 0s;
        }

        .b2 {
            width: 300px;
            height: 300px;
            background: #22d3ee;
            right: 8%;
            top: 18%;
            animation-delay: 2s;
        }

        .b3 {
            width: 180px;
            height: 180px;
            background: #8b5cf6;
            left: 20%;
            bottom: 10%;
            animation-delay: 4s;
        }

        .b4 {
            width: 240px;
            height: 240px;
            background: #14b8a6;
            right: 20%;
            bottom: 6%;
            animation-delay: 1s;
        }

        @keyframes float {
            0% {
                transform: translateY(0px) translateX(0px);
            }

            50% {
                transform: translateY(-18px) translateX(10px);
            }

            100% {
                transform: translateY(0px) translateX(0px);
            }
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: min(92vw, 420px);
            padding: 28px 24px;
            border-radius: 20px;
            background: rgba(255, 255, 255, .10);
            border: 1px solid rgba(255, 255, 255, .22);
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, .35);
            animation: pop .5s ease;
        }

        @keyframes pop {
            from {
                transform: scale(.95);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 16px;
        }

        .brand h2 {
            margin: 0;
            font-weight: 700;
            letter-spacing: .3px;
        }

        .brand p {
            margin: 6px 0 0;
            color: #dbeafe;
            font-size: .92rem;
        }

        .form-control {
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .25);
            background: rgba(255, 255, 255, .14);
            color: #fff;
            padding: 12px 14px;
        }

        .form-control::placeholder {
            color: #d1d5db;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, .18);
            color: #fff;
            border-color: #60a5fa;
            box-shadow: 0 0 0 .2rem rgba(96, 165, 250, .25);
        }

        .btn-login {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 11px 14px;
            font-weight: 600;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: #fff;
            transition: .25s ease;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(14, 165, 233, .35);
        }

        .small-note {
            text-align: center;
            margin-top: 12px;
            font-size: .86rem;
            color: #cbd5e1;
        }

        .tilt {
            transform-style: preserve-3d;
            transition: transform .15s linear;
        }
    </style>
</head>

<body>
    <div class="bg-bubble b1"></div>
    <div class="bg-bubble b2"></div>
    <div class="bg-bubble b3"></div>
    <div class="bg-bubble b4"></div>

    <div class="login-card tilt" id="loginCard">
        <div class="brand">
            <h2>StudySense</h2>
            <p>Welcome back 👋 Login to continue</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="small-note">Track your study • Improve focus • Build streak 🔥</div>
    </div>

    <script>
        // Moveable / tilt animation
        const card = document.getElementById("loginCard");
        document.addEventListener("mousemove", (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 35;
            const y = (window.innerHeight / 2 - e.clientY) / 35;
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });
        document.addEventListener("mouseleave", () => {
            card.style.transform = "rotateY(0deg) rotateX(0deg)";
        });
    </script>
</body>

</html>
