{% extends "base.html" %}
{% block content %}
<div class="card glass-card p-4 slide-up">
    <h3><i class="fa-solid fa-pen"></i> Log Study Session</h3>
    <form method="POST" class="row g-3 mt-2">
        <div class="col-md-6">
            <label>Subject</label>
            <input type="text" name="subject" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label>Study Time (hours)</label>
            <input type="number" step="0.1" name="study_time" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label>Break Time (minutes)</label>
            <input type="number" step="1" name="break_time" class="form-control" required>
        </div>
        <div class="col-md-4">
            <label>Start Time</label>
            <input type="time" name="start_time" class="form-control" required>
        </div>
        <div class="col-md-4">
            <label>Difficulty</label>
            <select name="difficulty" class="form-select" required>
                <option>Easy</option>
                <option>Medium</option>
                <option>Hard</option>
            </select>
        </div>
        <div class="col-md-4">
            <label>Mood</label>
            <select name="mood" class="form-select" required>
                <option>Focused</option>
                <option>Motivated</option>
                <option>Neutral</option>
                <option>Tired</option>
            </select>
        </div>
        <div class="col-md-4">
            <label>Date</label>
            <input type="date" name="date" class="form-control">
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save Session</button>
        </div>
    </form>
</div>
{% endblock %}
